<head>

    <!-- Open Graph -->
    <meta property="og:title" content="Danica Milánovics – Könyvek">
    <meta property="og:description" content="Ingyenesen letölthető könyvek, borítók és leírások egy helyen.">

    <meta property="og:url" content="https://danica-books.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="hu_HU">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Danica Milánovics – Könyvek">
    <meta name="twitter:description" content="Ingyenesen letölthető könyvek, borítók és leírások egy helyen.">
    <meta name="twitter:image" content="https://danica-books.github.io/images/alap-borito.jpg">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png" type="image/png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&subset=latin-ext&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", sans-serif;
            background: #eef1f5;
            color: #2c3e50;
        }

        /* ⭐ Egységes felső navigáció */
        header {
            background: #1f3b5c;
            padding: 12px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .navbar {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* ⭐ Modern hero szekció */
        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(to bottom right, #ffffff, #dfe6ee);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .hero h1 {
            font-size: 2.6rem;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #555;
        }

        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 14px 22px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: #217dbb;
        }

        /* ⭐ Hero alatti kép szekció */
        .hero-image {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hero-image img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        /* ⭐ Lábléc */
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- ⭐ Egységes fejléc -->
    <header>
        <nav class="navbar">
            <a href="index.html">Főoldal</a>
            <a href="konyvek.html">Könyvek</a>
            <a href="bemutatkozás.html">Bemutatkozás</a>
        </nav>
    </header>

    <!-- ⭐ Modern hero szekció -->
    <section class="hero">
        <h1>Üdvözöllek a könyves oldalon!</h1>
        <p>Fedezd fel a könyveket, amelyek inspirálnak, tanítanak és kikapcsolnak.</p>
        <a href="konyvek.html" class="btn">Könyvek megtekintése</a>
    </section>

    <!-- ⭐ Hero alatti kép -->
    <section class="hero-image">
        <img src="images/hero.jpg" alt="Könyves hangulatkép">
    </section>

    <!-- ⭐ Lábléc -->
    <footer>
        © 2026 Danica Milánovics – Minden jog fenntartva.
    </footer>

</body>
</html>
