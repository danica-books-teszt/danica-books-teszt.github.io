<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Alap meta -->
    <title>Danica Milánovics – Könyvek</title>
    <meta name="description" content="Ingyenesen letölthető könyvek, borítók és leírások egy helyen.">

    <!-- Open Graph -->
    <meta property="og:title" content="Danica Milánovics – Könyvek">
    <meta property="og:description" content="Ingyenesen letölthető könyvek, borítók és leírások egy helyen.">
    <meta property="og:image" content="https://danica-books.github.io/images/alap-borito.jpg">
    <meta property="og:url" content="https://danica-books.github.io/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="hu_HU">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Danica Milánovics – Könyvek">
    <meta name="twitter:description" content="Ingyenesen letölthető könyvek, borítók és leírások egy helyen.">
    <meta name="twitter:image" content="https://danica-books.github.io/images/alap-borito.jpg">

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png" type="image/png">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&subset=latin-ext&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Netlify Identity -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        /* ⭐ Egységes felső navigáció (középre igazítva) */
        header {
            background: #1f3b5c;
            padding: 12px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .navbar {
            display: flex;
            justify-content: center;   /* <<< KÖZÉPRE IGAZÍTÁS */
            gap: 20px;
        }

        .navbar a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
        }

        .navbar a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- ⭐ Egységes fejléc -->
    <header>
        <nav class="navbar">
            <a href="index.html">Főoldal</a>
            <a href="konyvek.html">Könyvek</a>
            <a href="bemutatkozás.html">Bemutatkozás</a>
        </nav>
    </header>

    <main>

        <!-- ÚJ HERO SZEKCIÓ -->
        <section class="hero">
            <h1>Üdvözöllek a könyves oldalon!</h1>
            <p>Fedezd fel a könyveket, amelyek inspirálnak, tanítanak és kikapcsolnak.</p>
            <a href="konyvek.html" class="btn">Könyvek megtekintése</a>
        </section>

        <!-- Könyvlista -->
        <div id="book-list" class="book-grid"></div>

        <!-- Lapozás -->
        <div class="pagination">
            <button id="prev-btn" onclick="prevPage()">Előző</button>
            <span id="page-number">1 / 1</span>
            <button id="next-btn" onclick="nextPage()">Következő</button>
        </div>

    </main>

    <!-- Könyvek JS -->
    <script src="js/books.js"></script>

    <!-- Netlify Identity redirect -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

</body>
</html>
